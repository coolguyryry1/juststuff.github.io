<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stuff</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='0' y='0' width='45' height='45' rx='5' fill='%234A90E2'/><rect x='55' y='0' width='45' height='45' rx='5' fill='%2363B3ED'/><rect x='0' y='55' width='45' height='45' rx='5' fill='%232D3748'/><rect x='55' y='55' width='45' height='45' rx='5' fill='%23ED64A6'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <nav class="toolbar">
        <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

        <div class="nav-links" id="mobile-menu">
            <button class="nav-btn active" onclick="showTab('home')">Home</button>
            <button class="nav-btn" onclick="showTab('barca')">FC Barcelona</button>
            <button class="nav-btn" onclick="showTab('game')">Game</button>
            <button class="nav-btn" onclick="showTab('ai')">AI</button>
        </div>

        <div class="account-zone" style="position: relative; z-index: 1001;">
            <div id="g_id_onload"
                 data-client_id="395838452484-29r7mrhrb50og9elibotn4e3051fmi03.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div style="display: inline-block;">
                <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="outline"></div>
            </div>
            <div id="user-profile" style="display: none;">
                <img id="user-avatar" src="" alt="User" title="Profile">
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>stuff</h1>
        </header>

        <div id="home" class="tab-content active">
            <section class="card">
                <h2>Spotify 🎵</h2>
                <div id="spotify-wrapper"></div>
                <div style="margin-top: 15px; display: flex; gap: 5px;">
                    <input type="text" id="spotify-link-input" placeholder="Paste Spotify link here...">
                    <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="updateUserMusic()">Set</button>
                </div>
            </section>

            <section class="card" id="calendar-container" style="display:none;">
                <h2>Schedule</h2>
                <p>User: <span id="user-email"></span></p>
                <iframe id="google-calendar-iframe" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
            </section>
        </div>

        <div id="barca" class="tab-content">
            <section class="card">
                <h2>FC Barcelona Updates</h2>
                <div id="widget-container" style="min-height: 500px; position: relative;">
                    <div data-widget-type="entityScores" 
                         data-entity-type="team" 
                         data-entity-id="132" 
                         data-lang="en" 
                         data-widget-id="35cb5715-3e5e-4277-a2f6-3c0d477a56fd" 
                         data-theme="dark">
                    </div>
                </div>
                <div style="font-size: 10px; margin-top: 10px; text-align: center; opacity: 0.7;">
                    Powered by <a href="https://www.365scores.com" target="_blank" rel="noopener" style="color: #4A90E2; text-decoration: none !important;">365Scores.com</a>
                </div>
            </section>
        </div>

        <div id="game" class="tab-content">
            <section class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2>Doodle Jump</h2>
                    <button onclick="toggleFullScreen()" class="btn mobile-only-btn" style="padding: 6px 12px; font-size: 12px;">⛶ Full Screen</button>
                </div>

                <div class="game-container" id="game-container">
                    <canvas id="jumpGame" width="300" height="500"></canvas>
                    <button id="mobile-shoot-btn" class="shoot-btn">Shoot!</button>
                    <input type="text" id="mobile-keyboard-trigger" style="position: absolute; opacity: 0; pointer-events: none;">
                </div>

                <div class="controls" style="margin-top: 15px;">
                    <p>Score: <span id="jumpScore" style="font-weight: bold; color: #4A90E2;">0</span></p>
                    <button onclick="initJumpGame()" class="btn" style="width: 100%;">Start Game</button>
                </div>

                <p class="mobile-only-text" style="font-size: 11px; opacity: 0.6; margin-top: 12px; text-align: center;">
                    Touch sides to move • Tap 'Shoot' to fire
                </p>
                <p class="desktop-only-text" style="font-size: 11px; opacity: 0.6; margin-top: 12px; text-align: center;">
                    Arrows to move • Space to shoot
                </p>
            </section>
        </div>

        <div id="ai" class="tab-content">
            <section class="card">
                <h2>AI Assistant</h2>
                <div id="chat-window" class="chat"></div>
                <div class="input-group">
                    <input type="text" id="user-input" placeholder="Ask anything...">
                    <button onclick="askAI()" class="btn">Send</button>
                </div>
            </section>
        </div>
    </div>

    <div id="settings-modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);">
        <div class="settings-content">
            <h2 style="margin-top:0; border:none;">Settings</h2>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            
            <div style="margin: 20px 0; display: flex; justify-content: space-between; align-items: center;">
                <span>Dark Mode</span>
                <button onclick="toggleDarkMode()" id="dark-mode-btn" class="btn" style="padding: 5px 15px;">Off</button>
            </div>

            <div style="margin: 20px 0;">
                <p id="settings-email" style="font-size: 13px; opacity: 0.8; margin-bottom: 10px;"></p>
                <button onclick="handleSignOut()" style="width: 100%; padding: 12px; background: #e53e3e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Sign Out</button>
            </div>

            <button onclick="closeSettings()" style="background: none; border: none; color: #4A90E2; cursor: pointer; text-decoration: underline; font-size: 14px;">Close</button>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://widgets.365scores.com/main.js"></script>
    <script src="script.js"></script>
</body>
</html>

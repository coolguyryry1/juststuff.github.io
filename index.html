<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stuff</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='0' y='0' width='45' height='45' rx='5' fill='%234A90E2'/><rect x='55' y='0' width='45' height='45' rx='5' fill='%2363B3ED'/><rect x='0' y='55' width='45' height='45' rx='5' fill='%232D3748'/><rect x='55' y='55' width='45' height='45' rx='5' fill='%23ED64A6'/></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <nav class="toolbar">
        <div class="nav-links">
            <button class="nav-btn active" onclick="showTab('home')">Home</button>
            <button class="nav-btn" onclick="showTab('barca')">Barça</button>
            <button class="nav-btn" onclick="showTab('game')">Game</button>
            <button class="nav-btn" onclick="showTab('ai')">AI</button>
        </div>

        <div class="account-zone">
            <div id="g_id_onload"
                 data-client_id="395838452484-29r7mrhrb50og9elibotn4e3051fmi03.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="outline"></div>
            <div id="user-profile" style="display: none;">
                <img id="user-avatar" src="" alt="User" title="Profile">
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>stuff</h1>
        </header>

        <div id="home" class="tab-content active">
            <section class="card">
                <h2>Vibe Check 🎵</h2>
                <div id="spotify-wrapper"></div>
                <div style="margin-top: 15px; display: flex; gap: 5px;">
                    <input type="text" id="spotify-link-input" placeholder="Paste Spotify link here...">
                    <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="updateUserMusic()">Set</button>
                </div>
            </section>

            <section class="card" id="calendar-container" style="display:none;">
                <h2>Schedule</h2>
                <p>User: <span id="user-email"></span></p>
                <iframe id="google-calendar-iframe" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
            </section>
        </div>

        <div id="barca" class="tab-content">
            <section class="card">
                <h2>Barça Updates</h2>
                <div id="widget-f7zrmo3f2vrk" class="scoreaxis-widget" style="width: auto;height: auto;min-height: 500px;font-size: 14px;background-color: #ffffff;color: #141416;border: 1px solid;border-color: #ecf1f7;overflow: auto;">
                    <script src="https://widgets.scoreaxis.com/api/football/team-info/62321b15adaf4b2bd73de814?widgetId=f7zrmo3f2vrk&lang=en&statsBlock=1&playersBlock=1&matchesBlock=1&links=1&font=heebo&fontSize=14&rowDensity=100&widgetWidth=auto&widgetHeight=auto&bodyColor=%23ffffff&textColor=%23141416&linkColor=%23141416&borderColor=%23ecf1f7&tabColor=%23f3f8fd" async></script>
                    <div class="widget-main-link" style="padding: 6px 12px;font-weight: 500;">
                        Live data by <a href="https://www.scoreaxis.com/" style="color: inherit;">Scoreaxis</a>
                    </div>
                </div>
            </section>
        </div>

        <div id="game" class="tab-content">
            <section class="card">
                <h2>Doodle Jump</h2>
                <div class="game-box">
                    <canvas id="jumpGame" width="300" height="500"></canvas>
                    <input type="text" id="mobile-keyboard-trigger" style="position: absolute; opacity: 0; pointer-events: none;">
                    <div class="controls">
                        <p>Score: <span id="jumpScore">0</span></p>
                        <button onclick="initJumpGame()" class="btn">Start Game</button>
                    </div>
                </div>
            </section>
        </div>

        <div id="ai" class="tab-content">
            <section class="card">
                <h2>AI Assistant</h2>
                <div id="chat-window" class="chat"></div>
                <div class="input-group">
                    <input type="text" id="user-input" placeholder="Ask anything...">
                    <button onclick="askAI()" class="btn">Send</button>
                </div>
            </section>
        </div>
    </div>

    <div id="settings-modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.7);">
        <div class="settings-content" style="background-color: var(--tab-bg); color: var(--text-color); margin: 10% auto; padding: 25px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <h2 style="margin-top:0;">Settings</h2>
            <hr>
            
            <div style="margin: 20px 0; display: flex; justify-content: space-between; align-items: center;">
                <span>Dark Mode</span>
                <button onclick="toggleDarkMode()" id="dark-mode-btn" class="btn" style="padding: 5px 10px;">Off</button>
            </div>

            <div style="margin: 20px 0;">
                <p id="settings-email" style="font-size: 12px; opacity: 0.7;"></p>
                <button onclick="handleSignOut()" style="width: 100%; padding: 10px; background: #e53e3e; color: white; border: none; border-radius: 5px; cursor: pointer;">Sign Out</button>
            </div>

            <button onclick="closeSettings()" style="background: none; border: none; color: #4A90E2; cursor: pointer; text-decoration: underline;">Close</button>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <script src="script.js"></script>
</body>
</html>
